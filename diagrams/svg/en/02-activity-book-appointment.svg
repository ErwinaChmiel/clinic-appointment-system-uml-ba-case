<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1050" viewBox="0 0 1500 1050" role="img" aria-label="Activity diagram — appointment booking process">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#172033" />
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #182233; }
      .subtitle { font: 500 14px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .laneTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #182233; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .mono { font: 500 14px Arial, Helvetica, sans-serif; fill: #182233; }
      .shapeText { font: 600 15px Arial, Helvetica, sans-serif; fill: #182233; }
      .classTitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .classBody { font: 500 13px Arial, Helvetica, sans-serif; fill: #182233; }
    </style>
  </defs>
  <rect x="0" y="0" width="1500" height="1050" rx="18" fill="#FFFFFF"/>

<text x="750.0" y="38.0" class="title" text-anchor="middle" dominant-baseline="middle">
<tspan x="750.0" dy="0">Activity diagram — appointment booking process</tspan>
</text>
<rect x="40" y="75" width="1420" height="920" rx="18" fill="#FFFFFF" stroke="#D8E1EC" stroke-width="1.5"/>
<rect x="40" y="75" width="1420" height="60" rx="18" fill="#EEF4FB" stroke="#D8E1EC" stroke-width="1.5"/>
<rect x="40" y="120" width="1420" height="15" fill="#EEF4FB"/>
<polyline points="290,75 290,995" fill="none" stroke="#D8E1EC" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="720,75 720,995" fill="none" stroke="#D8E1EC" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="1060,75 1060,995" fill="none" stroke="#D8E1EC" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="165.0" y="106.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="165.0" dy="0">Patient</tspan>
</text>
<text x="505.0" y="106.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="505.0" dy="0">Booking System</tspan>
</text>
<text x="890.0" y="106.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="890.0" dy="0">Payment Gateway</tspan>
</text>
<text x="1260.0" y="106.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="1260.0" dy="0">Notification Service</tspan>
</text>
<circle cx="165" cy="170" r="16" fill="#111827"/>
<polyline points="165,186 165,225" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="95" y="225" width="140" height="70" rx="14" fill="#EEF6FF" stroke="#2563EB" stroke-width="2" filter="url(#softShadow)"/>
<text x="165" y="260.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="165" dy="0">Select slot</tspan>
</text>
<polyline points="235,260 355,260" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="355" y="215" width="275" height="90" rx="14" fill="#EEF6FF" stroke="#2563EB" stroke-width="2" filter="url(#softShadow)"/>
<text x="492" y="250.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="492" dy="0">Temporarily reserve</tspan>
<tspan x="492" dy="20">selected slot</tspan>
</text>
<polyline points="492,305 492,365" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polygon points="492,370.0 602.0,440 492,510.0 382.0,440" fill="#FFF7ED" stroke="#EA8A00" stroke-width="2" filter="url(#softShadow)"/>
<text x="492" y="430.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="492" dy="0">Prepayment</tspan>
<tspan x="492" dy="20">required?</tspan>
</text>
<text x="445" y="540.0" class="label" text-anchor="middle" dominant-baseline="middle">
<tspan x="445" dy="0">No</tspan>
</text>
<polyline points="492,510 492,780" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="620" y="420.0" class="label" text-anchor="middle" dominant-baseline="middle">
<tspan x="620" dy="0">Yes</tspan>
</text>
<polyline points="602,440 790,440" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="790" y="400" width="245" height="80" rx="14" fill="#EEF6FF" stroke="#2563EB" stroke-width="2" filter="url(#softShadow)"/>
<text x="912" y="430.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="912" dy="0">Authorize</tspan>
<tspan x="912" dy="20">payment</tspan>
</text>
<polyline points="912,480 912,540" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polygon points="912,540.0 1027.0,615 912,690.0 797.0,615" fill="#FFF7ED" stroke="#EA8A00" stroke-width="2" filter="url(#softShadow)"/>
<text x="912" y="606.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="912" dy="0">Payment</tspan>
<tspan x="912" dy="18">successful?</tspan>
</text>
<text x="770" y="595.0" class="label" text-anchor="middle" dominant-baseline="middle">
<tspan x="770" dy="0">Yes</tspan>
</text>
<polyline points="797,615 650,615 650,740 492,740" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="1050" y="595.0" class="label" text-anchor="middle" dominant-baseline="middle">
<tspan x="1050" dy="0">No</tspan>
</text>
<polyline points="1027,615 1120,615" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="1120" y="575" width="230" height="80" rx="14" fill="#FFF7ED" stroke="#EA8A00" stroke-width="2" filter="url(#softShadow)"/>
<text x="1235" y="605.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="1235" dy="0">Release slot</tspan>
<tspan x="1235" dy="20">and show error</tspan>
</text>
<polyline points="1350,615 1390,615" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<circle cx="1415" cy="615" r="18" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
<circle cx="1415" cy="615" r="10" fill="#111827"/>
<rect x="1120" y="675" width="230" height="40" rx="8" fill="#FFFFFF" stroke="#D8E1EC" stroke-width="1.4"/>
<text x="1235" y="695.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="1235" dy="0">Try another slot</tspan>
</text>
<rect x="375" y="780" width="235" height="82" rx="14" fill="#ECFDF5" stroke="#0F766E" stroke-width="2" filter="url(#softShadow)"/>
<text x="492" y="811.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="492" dy="0">Confirm</tspan>
<tspan x="492" dy="20">appointment</tspan>
</text>
<polyline points="610,821 1180,821" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="1180" y="780" width="250" height="82" rx="14" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" filter="url(#softShadow)"/>
<text x="1305" y="811.0" class="shapeText" text-anchor="middle" dominant-baseline="middle">
<tspan x="1305" dy="0">Send confirmation</tspan>
<tspan x="1305" dy="20">message</tspan>
</text>
<polyline points="1305,862 1305,925" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<circle cx="1305" cy="955" r="25" fill="#FFFFFF" stroke="#111827" stroke-width="4"/>
<circle cx="1305" cy="955" r="14" fill="#111827"/>
</svg>
