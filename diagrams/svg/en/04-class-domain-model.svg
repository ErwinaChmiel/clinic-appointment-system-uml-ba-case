<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-label="Class diagram — domain model">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#172033" />
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #182233; }
      .subtitle { font: 500 14px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .laneTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #182233; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .mono { font: 500 14px Arial, Helvetica, sans-serif; fill: #182233; }
      .shapeText { font: 600 15px Arial, Helvetica, sans-serif; fill: #182233; }
      .classTitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .classBody { font: 500 13px Arial, Helvetica, sans-serif; fill: #182233; }
    </style>
  </defs>
  <rect x="0" y="0" width="1500" height="1000" rx="18" fill="#FFFFFF"/>

<text x="750.0" y="42.0" class="title" text-anchor="middle" dominant-baseline="middle">
<tspan x="750.0" dy="0">Class diagram — domain model</tspan>
</text>
<rect x="550" y="105" width="330" height="185" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="2" filter="url(#softShadow)"/>
