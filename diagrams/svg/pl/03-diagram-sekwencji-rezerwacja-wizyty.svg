<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Diagram sekwencji — rezerwacja wizyty">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#172033" />
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #182233; }
      .subtitle { font: 500 14px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .laneTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #182233; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .mono { font: 500 14px Arial, Helvetica, sans-serif; fill: #182233; }
      .shapeText { font: 600 15px Arial, Helvetica, sans-serif; fill: #182233; }
      .classTitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .classBody { font: 500 13px Arial, Helvetica, sans-serif; fill: #182233; }
    </style>
  </defs>
  <rect x="0" y="0" width="1400" height="900" rx="18" fill="#FFFFFF"/>

<text x="700.0" y="42.0" class="title" text-anchor="middle" dominant-baseline="middle">
<tspan x="700.0" dy="0">Diagram sekwencji — rezerwacja wizyty</tspan>
</text>
<rect x="85" y="90" width="190" height="56" rx="10" fill="#EEF4FB" stroke="#D8E1EC" stroke-width="2"/>
<text x="180" y="118.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="180" dy="0">Pacjent</tspan>
</text>
<polyline points="180,146 180,820" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
<rect x="172" y="190" width="16" height="520" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
<rect x="415" y="90" width="190" height="56" rx="10" fill="#EEF4FB" stroke="#D8E1EC" stroke-width="2"/>
<text x="510" y="118.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="510" dy="0">System rezerwacji</tspan>
</text>
<polyline points="510,146 510,820" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
<rect x="502" y="190" width="16" height="520" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
<rect x="735" y="90" width="190" height="56" rx="10" fill="#EEF4FB" stroke="#D8E1EC" stroke-width="2"/>
<text x="830" y="118.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="830" dy="0">Bramka płatności</tspan>
</text>
<polyline points="830,146 830,820" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
<rect x="822" y="190" width="16" height="520" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
<rect x="1050" y="90" width="190" height="56" rx="10" fill="#EEF4FB" stroke="#D8E1EC" stroke-width="2"/>
<text x="1145" y="118.0" class="laneTitle" text-anchor="middle" dominant-baseline="middle">
<tspan x="1145" dy="0">Usługa powiadomień</tspan>
</text>
<polyline points="1145,146 1145,820" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
<rect x="1137" y="190" width="16" height="520" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
<polyline points="180,205 510,205" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="345" y="190.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="345" dy="0">1. Wybiera termin</tspan>
</text>
<polyline points="510,270 610,270 610,315 510,315" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="620" y="288.0" class="small" text-anchor="start" dominant-baseline="middle">
<tspan x="620" dy="0">2. Blokuje termin</tspan>
</text>
<polyline points="510,335 610,335 610,380 510,380" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="620" y="353.0" class="small" text-anchor="start" dominant-baseline="middle">
<tspan x="620" dy="0">3. Sprawdza wymóg przedpłaty</tspan>
</text>
<polyline points="510,405 830,405" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="670" y="390.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="670" dy="0">4. Inicjuje płatność</tspan>
</text>
<polyline points="830,475 510,475" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" stroke-dasharray="8 8"/>
<text x="670" y="460.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="670" dy="0">5. Zwraca status płatności</tspan>
</text>
<polyline points="510,545 610,545 610,590 510,590" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="620" y="563.0" class="small" text-anchor="start" dominant-baseline="middle">
<tspan x="620" dy="0">6. Potwierdza wizytę</tspan>
</text>
<polyline points="510,620 1145,620" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<text x="827" y="605.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="827" dy="0">7. Wysyła potwierdzenie</tspan>
</text>
<polyline points="510,690 180,690" fill="none" stroke="#172033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" stroke-dasharray="8 8"/>
<text x="345" y="675.0" class="small" text-anchor="middle" dominant-baseline="middle">
<tspan x="345" dy="0">8. Zwraca potwierdzenie</tspan>
</text>
</svg>
