    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #182233; }
      .subtitle { font: 500 14px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .laneTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #182233; }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .small { font: 500 13px Arial, Helvetica, sans-serif; fill: #5F6B7A; }
      .mono { font: 500 14px Arial, Helvetica, sans-serif; fill: #182233; }
      .shapeText { font: 600 15px Arial, Helvetica, sans-serif; fill: #182233; }
      .classTitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #182233; }
      .classBody { font: 500 13px Arial, Helvetica, sans-serif; fill: #182233; }
    </style>
  </defs>
  <rect x="0" y="0" width="1450" height="900" rx="18" fill="#FFFFFF"/>

